<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
<header th:replace="~{fragments/header :: header('login')}"></header>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="flex-1">
<section class="container mx-auto px-4 py-16 md:py-24 grid place-items-center">
<div class="relative w-full max-w-md">
<div class="absolute -inset-6 bg-gradient-aurora opacity-25 blur-3xl rounded-3xl"></div>
<div class="relative glass-strong rounded-3xl p-8 shadow-elegant">
<h1 class="text-center font-display text-2xl font-semibold">Welcome back</h1>
<p class="text-center text-sm text-muted-foreground">Sign in to continue</p>
<form th:action="@{/users/login}" method="post" class="mt-8 space-y-4">
<label class="block"><span class="text-sm font-medium">Email</span>
<input type="email" name="email" required class="flex w-full rounded-md border mt-1.5 h-11 px-3 bg-white/5 border-white/10 md:text-sm"/></label>
<label class="block"><span class="text-sm font-medium">Password</span>
<input type="password" name="password" required class="flex w-full rounded-md border mt-1.5 h-11 px-3 bg-white/5 border-white/10 md:text-sm"/></label>
<button type="submit" class="w-full h-10 rounded-md bg-gradient-primary text-primary-foreground font-medium shadow-glow">Sign in</button>
</form>
<p class="mt-6 text-center text-sm text-muted-foreground">New here?
<a th:href="@{/users/register}" class="text-primary-glow hover:underline">Create an account</a></p>
</div>
</div>
</section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
