<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Profile - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
<header th:replace="~{fragments/header :: header('dashboard')}"></header>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="flex-1 container mx-auto px-4 py-12 max-w-lg">
<h1 class="font-display text-3xl font-semibold">Edit profile</h1>
<p class="text-muted-foreground text-sm mt-1">Updates users.txt</p>
<form th:action="@{/users/profile}" method="post" class="mt-8 glass-strong rounded-2xl p-6 space-y-4">
<label class="block text-sm">Full name
<input type="text" name="fullName" th:value="${user.fullName}" required class="w-full mt-1 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<label class="block text-sm">Phone
<input type="tel" name="phone" th:value="${user.phone}" class="w-full mt-1 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<label class="block text-sm">City
<input type="text" name="city" th:value="${user.city}" class="w-full mt-1 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<label class="block text-sm">Country
<input type="text" name="country" th:value="${user.country}" class="w-full mt-1 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<p class="text-xs text-muted-foreground">Email: <span th:text="${user.email}">email</span> (cannot change)</p>
<button type="submit" class="w-full h-10 rounded-md bg-gradient-primary text-primary-foreground font-medium">Save profile</button>
</form>
<a th:href="@{/dashboard}" class="inline-block mt-4 text-sm text-primary-glow hover:underline">&larr; Back to dashboard</a>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
