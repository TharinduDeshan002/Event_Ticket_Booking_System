<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Book Tickets - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
<header th:replace="~{fragments/header :: header('events')}"></header>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="flex-1">
<section class="container mx-auto px-4 py-12 grid gap-8 lg:grid-cols-[1.4fr_1fr]" th:if="${event != null}">
<div class="space-y-6">
<div class="relative overflow-hidden rounded-3xl shadow-elegant">
<img th:src="@{'/images/' + ${event.image}}" th:alt="${event.title}" class="w-full h-72 md:h-96 object-cover"/>
<div class="absolute bottom-0 p-6">
<h1 class="font-display text-3xl font-semibold" th:text="${event.title}">Event</h1>
<p class="text-sm text-muted-foreground" th:text="|${event.formattedDate} · ${event.time} · ${event.location}|">Details</p>
</div>
</div>
</div>
<aside class="glass-strong rounded-2xl p-6 shadow-elegant h-fit">
<h2 class="font-display text-xl font-semibold">Complete booking</h2>
<p class="text-sm text-muted-foreground">Saved to bookings.txt</p>
<form th:action="@{/bookings/book}" method="post" class="mt-6 space-y-4">
<input type="hidden" name="eventId" th:value="${event.id}"/>
<label class="block text-sm font-medium">Full name
<input type="text" name="customerName" th:value="${user.fullName}" required class="w-full mt-1.5 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<label class="block text-sm font-medium">Email
<input type="email" name="customerEmail" th:value="${user.email}" required class="w-full mt-1.5 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<label class="block text-sm font-medium">Tickets
<input type="number" name="ticketCount" value="1" min="1" th:max="${event.availableTickets}" required class="w-full mt-1.5 h-11 px-3 rounded-md bg-white/5 border border-white/10"/></label>
<p class="text-sm">Price per ticket: <span th:text="${event.formattedPrice}">$0</span></p>
<button type="submit" class="w-full h-11 rounded-md bg-gradient-primary text-primary-foreground font-medium shadow-glow">Confirm booking</button>
</form>
</aside>
</section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
