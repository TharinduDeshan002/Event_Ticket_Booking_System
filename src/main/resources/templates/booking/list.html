<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Bookings - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
<header th:replace="~{fragments/header :: header('dashboard')}"></header>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="flex-1">
<section class="container mx-auto px-4 py-12">
<div class="grid gap-8 lg:grid-cols-[1fr_2fr]">
<aside class="glass-strong rounded-2xl p-6 shadow-elegant self-start lg:sticky lg:top-24">
<div class="flex items-center gap-4">
<div class="grid h-14 w-14 place-items-center rounded-2xl bg-gradient-aurora text-xl font-bold shadow-glow" th:text="${user.initials}">JD</div>
<div>
<div class="font-semibold" th:text="${user.fullName}">Name</div>
<div class="text-xs text-muted-foreground" th:text="|Member since ${user.registeredDate}|">Member</div>
</div>
</div>
<dl class="mt-6 space-y-3 text-sm text-muted-foreground">
<div th:text="${user.email}">email</div>
<div th:text="${user.phone}">phone</div>
<div th:text="|${user.city}, ${user.country}|">location</div>
</dl>
<a th:href="@{/users/profile}" class="mt-6 block text-center rounded-md glass h-9 leading-9 text-sm">Edit profile</a>
<a th:href="@{/users/logout}" class="mt-2 block text-center text-xs text-muted-foreground hover:underline">Sign out</a>
</aside>
<div class="space-y-8">
<div>
<h1 class="font-display text-3xl font-semibold">Your bookings</h1>
<p class="text-muted-foreground mt-1">From bookings.txt</p>
</div>
<div th:if="${#lists.isEmpty(bookings)}" class="glass rounded-2xl p-8 text-center text-muted-foreground">
No bookings yet. <a th:href="@{/events}" class="text-primary-glow hover:underline">Browse events</a>
</div>
<div th:unless="${#lists.isEmpty(bookings)}">
<h2 class="text-sm uppercase tracking-wider text-muted-foreground mb-3">All bookings</h2>
<div class="grid gap-4 md:grid-cols-2">
<article th:each="b : ${bookings}" class="glass rounded-2xl overflow-hidden shadow-elegant">
<div class="relative h-32 overflow-hidden" th:if="${b.eventImage != null}">
<img th:src="@{'/images/' + ${b.eventImage}}" th:alt="${b.eventTitle}" class="h-full w-full object-cover"/>
<div class="absolute inset-0 p-4 flex flex-col justify-end bg-gradient-to-r from-background/80">
<span class="text-xs text-muted-foreground" th:text="${b.id}">B001</span>
<h3 class="font-semibold" th:text="${b.eventTitle}">Event</h3>
</div>
</div>
<div class="p-4 text-sm space-y-1 text-muted-foreground">
<div th:text="|${b.eventDate} · ${b.eventTime}|">Date</div>
<div th:text="|${b.eventVenue}, ${b.eventLocation}|">Venue</div>
<div th:text="|${b.ticketCount} ticket(s) · ${b.formattedTotal}|">Tickets</div>
<div>
<span th:if="${b.confirmed}" class="rounded-full px-2.5 py-0.5 text-xs bg-gradient-primary text-primary-foreground">Confirmed</span>
<span th:if="${b.cancelled}" class="rounded-full px-2.5 py-0.5 text-xs bg-white/10">Cancelled</span>
</div>
<form th:if="${b.confirmed}" th:action="@{/bookings/cancel}" method="post" class="pt-3 flex justify-end">
<input type="hidden" name="bookingId" th:value="${b.id}"/>
<button type="submit" class="text-xs hover:bg-accent h-8 px-3 rounded-md">Cancel</button>
</form>
</div>
</article>
</div>
</div>
</div>
</div>
</section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
