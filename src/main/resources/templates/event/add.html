<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Add Event - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
<header th:replace="~{fragments/admin-header :: adminHeader('events')}"></header>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="flex-1 container mx-auto px-4 py-12 max-w-xl">
<h1 class="font-display text-3xl font-semibold">Add event</h1>
<p class="text-sm text-muted-foreground">Saved to events.txt</p>
<form th:action="@{/events/add}" method="post" class="mt-6 glass-strong rounded-2xl p-6 space-y-3">
<input type="text" name="title" placeholder="Title" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<select name="category" class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10">
<option value="Music">Music</option><option value="Sports">Sports</option><option value="Tech">Tech</option>
<option value="Arts">Arts</option><option value="Festival">Festival</option></select>
<input type="text" name="venue" placeholder="Venue" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input type="text" name="city" placeholder="City" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input type="text" name="country" placeholder="Country" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<div class="grid grid-cols-2 gap-3">
<input type="date" name="date" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input type="time" name="time" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
</div>
<div class="grid grid-cols-2 gap-3">
<input type="number" name="price" placeholder="Price USD" step="0.01" min="0" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input type="number" name="availableTickets" placeholder="Tickets" min="1" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
</div>
<input type="text" name="image" placeholder="Image filename (optional)" class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<button type="submit" class="w-full h-10 rounded-md bg-gradient-primary text-primary-foreground font-medium">Save event</button>
</form>
<a th:href="@{/admin/dashboard}" class="inline-block mt-4 text-sm text-primary-glow hover:underline">&larr; Admin dashboard</a>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
