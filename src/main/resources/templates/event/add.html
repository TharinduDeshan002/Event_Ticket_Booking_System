<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="header" th:replace="~{fragments/layout :: header}"></header>
<main class="container page-main">
    <a class="back-link" th:href="@{/events}">&larr; Back to Events</a>
    <h2>Add New Event</h2>
    <form>
        <div class="form-group"><label for="title">Title</label><input type="text" id="title" name="title"></div>
        <div class="form-group"><label for="venue">Venue</label><input type="text" id="venue" name="venue"></div>
        <div class="form-group"><label for="date">Date</label><input type="date" id="date" name="date"></div>
        <div class="form-group"><label for="time">Time</label><input type="time" id="time" name="time"></div>
        <div class="form-group"><label for="price">Price</label><input type="number" id="price" name="price" step="0.01"></div>
        <div class="form-group"><label for="tickets">Available Tickets</label><input type="number" id="tickets" name="availableTickets"></div>
        <button type="submit" class="btn">Save Event</button>
    </form>
    <p class="placeholder-msg">Form UI ready â€” connect to EventService to save to events.txt.</p>
</main>
</body>
</html>
