<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="header" th:replace="~{fragments/layout :: header}"></header>
<main class="container page-main">
    <a class="back-link" th:href="@{/}">&larr; Back to Home</a>
    <h2>All Events</h2>
    <a th:href="@{/events/add}" class="btn">+ Add Event</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Venue</th>
            <th>Date</th>
            <th>Price</th>
            <th>Tickets</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td colspan="6" style="text-align: center; color: #888;">No events loaded yet — connect EventService to events.txt</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
