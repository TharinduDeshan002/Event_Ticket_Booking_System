<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Events - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
    <header th:replace="~{fragments/header :: header('events')}"></header>

    <main class="flex-1">
        <section class="container mx-auto px-4 pt-14 pb-8">
            <h1 class="font-display text-4xl md:text-5xl font-semibold">Discover <span class="text-gradient">every</span> event</h1>
            <p class="mt-2 text-muted-foreground max-w-xl">
                Browse <span th:text="${events.size()}">16</span> real-world events across the globe. All ticket prices shown in US dollars ($).
            </p>
            <div class="mt-8 flex flex-col md:flex-row md:items-center gap-4">
                <label class="relative md:w-96">
                    <input class="flex w-full rounded-md border pl-9 h-11 bg-white/5 border-white/10 md:text-sm"
                           placeholder="Search events or city…"/>
                </label>
                <div class="flex flex-wrap gap-2">
                    <a th:href="@{/events}" data-category-filter
                       th:classappend="${selectedCategory == 'all'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">All</a>
                    <a th:href="@{/events(category='music')}" data-category-filter
                       th:classappend="${selectedCategory == 'music'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">Music</a>
                    <a th:href="@{/events(category='sports')}" data-category-filter
                       th:classappend="${selectedCategory == 'sports'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">Sports</a>
                    <a th:href="@{/events(category='tech')}" data-category-filter
                       th:classappend="${selectedCategory == 'tech'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">Tech</a>
                    <a th:href="@{/events(category='theatre')}" data-category-filter
                       th:classappend="${selectedCategory == 'theatre'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">Theatre</a>
                    <a th:href="@{/events(category='culture')}" data-category-filter
                       th:classappend="${selectedCategory == 'culture'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">Culture</a>
                    <a th:href="@{/events(category='gaming')}" data-category-filter
                       th:classappend="${selectedCategory == 'gaming'} ? ' bg-gradient-primary text-primary-foreground border-transparent shadow-glow' : ' glass border-white/10 hover:bg-white/10'"
                       class="rounded-full px-4 py-1.5 text-sm transition-smooth border">Gaming</a>
                </div>
            </div>
        </section>

        <section class="container mx-auto px-4 pb-20">
            <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"
                 th:insert="~{fragments/event-cards :: grid(events=${events})}"></div>
            <p th:if="${events.isEmpty()}" class="text-center text-muted-foreground py-16">No events found in this category.</p>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
