<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin - Evently')}"></head>
<body>
<div class="min-h-screen flex flex-col">
<header th:replace="~{fragments/admin-header :: adminHeader('dashboard')}"></header>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="flex-1 container mx-auto px-4 py-12">
<div class="flex flex-wrap items-end justify-between gap-4">
<div>
<h1 class="font-display text-3xl font-semibold">Admin dashboard</h1>
<p class="text-muted-foreground mt-1">Signed in as <span th:text="${admin.fullName}">Admin</span> (<span th:text="${admin.username}">username</span>)</p>
</div>
<div class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
<div class="glass-strong rounded-2xl p-5"><span class="text-sm text-muted-foreground">Events</span>
<div class="mt-2 text-3xl font-bold" th:text="${totalEvents}">0</div></div>
<div class="glass-strong rounded-2xl p-5"><span class="text-sm text-muted-foreground">Users</span>
<div class="mt-2 text-3xl font-bold" th:text="${totalUsers}">0</div></div>
<div class="glass-strong rounded-2xl p-5"><span class="text-sm text-muted-foreground">Tickets sold</span>
<div class="mt-2 text-3xl font-bold" th:text="${ticketsSold}">0</div></div>
<div class="glass-strong rounded-2xl p-5"><span class="text-sm text-muted-foreground">Revenue (USD)</span>
<div class="mt-2 text-3xl font-bold" th:text="|$${#numbers.formatDecimal(revenue, 0, 'COMMA', 0, 'POINT')}|">$0</div></div>
</div>
</div>
<div class="mt-10 grid gap-8 lg:grid-cols-[1fr_1.6fr]">
<div class="glass-strong rounded-2xl p-6">
<h2 class="font-display text-xl font-semibold">Add event</h2>
<form th:action="@{/events/add}" method="post" class="mt-4 space-y-3">
<input name="title" placeholder="Title" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<select name="category" class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10">
<option value="Music">Music</option><option value="Sports">Sports</option><option value="Tech">Tech</option></select>
<input name="venue" placeholder="Venue" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input name="city" placeholder="City" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input name="country" placeholder="Country" required class="w-full h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<div class="grid grid-cols-2 gap-3">
<input type="date" name="date" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input type="time" name="time" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
</div>
<div class="grid grid-cols-2 gap-3">
<input type="number" name="price" placeholder="Price USD" step="0.01" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
<input type="number" name="availableTickets" placeholder="Tickets" min="1" required class="h-11 px-3 rounded-md bg-white/5 border border-white/10"/>
</div>
<button type="submit" class="w-full h-10 rounded-md bg-gradient-primary text-primary-foreground font-medium">Add event</button>
</form>
</div>
<div class="glass-strong rounded-2xl p-6 overflow-x-auto">
<h2 class="font-display text-xl font-semibold">All events</h2>
<table class="w-full text-sm mt-4">
<thead class="text-muted-foreground text-left"><tr>
<th class="py-2">Event</th><th class="py-2">Date</th><th class="py-2">Price</th><th class="py-2 text-right">Actions</th>
</tr></thead>
<tbody>
<tr th:each="e : ${events}" class="border-t border-white/5">
<td class="py-3"><div class="font-medium" th:text="${e.title}">Title</div>
<div class="text-xs text-muted-foreground" th:text="${e.category}">Cat</div></td>
<td class="py-3 text-muted-foreground" th:text="${e.date}">Date</td>
<td class="py-3" th:text="${e.formattedPrice}">$0</td>
<td class="py-3 text-right space-x-1">
<a th:href="@{/events/edit(id=${e.id})}" class="inline-block px-2 py-1 text-xs rounded hover:bg-accent">Edit</a>
<form th:action="@{/events/delete}" method="post" class="inline">
<input type="hidden" name="id" th:value="${e.id}"/>
<button type="submit" class="px-2 py-1 text-xs rounded hover:bg-accent">Delete</button>
</form>
</td>
</tr>
</tbody>
</table>
</div>
</div>
<div class="mt-8 glass-strong rounded-2xl p-6 overflow-x-auto">
<h2 class="font-display text-xl font-semibold">Users</h2>
<table class="w-full text-sm mt-4">
<thead class="text-muted-foreground text-left"><tr>
<th class="py-2">ID</th><th class="py-2">Name</th><th class="py-2">Email</th><th class="py-2">Role</th><th class="py-2 text-right">Actions</th>
</tr></thead>
<tbody>
<tr th:each="u : ${users}" class="border-t border-white/5">
<td class="py-3 text-muted-foreground" th:text="${u.id}">U001</td>
<td class="py-3 font-medium" th:text="${u.fullName}">Name</td>
<td class="py-3 text-muted-foreground" th:text="${u.email}">email</td>
<td class="py-3" th:text="${u.role}">USER</td>
<td class="py-3 text-right">
<form th:action="@{/admin/users/delete}" method="post" class="inline">
<input type="hidden" name="id" th:value="${u.id}"/>
<button type="submit" class="px-2 py-1 text-xs rounded hover:bg-accent">Delete</button>
</form>
</td>
</tr>
</tbody>
</table>
</div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
</body>
</html>
