<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="sticky top-0 z-50 glass-strong border-b border-amber-500/20" th:fragment="adminHeader(active)">
<div class="container mx-auto flex h-16 items-center justify-between px-4">
<a th:href="@{/admin/dashboard}" class="flex items-center gap-2">
<span class="font-display text-lg font-semibold">Evently <span class="text-amber-400 text-sm font-normal">Admin</span></span>
</a>
<nav class="hidden md:flex items-center gap-1">
<a th:href="@{/admin/dashboard}" class="rounded-lg px-3 py-2 text-sm font-medium"
   th:classappend="${active == 'dashboard'} ? ' bg-white/10 text-foreground' : ' text-muted-foreground hover:bg-white/5'">Dashboard</a>
<a th:href="@{/events/add}" class="rounded-lg px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-white/5">Add event</a>
<a th:href="@{/}" class="rounded-lg px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-white/5">Public site</a>
</nav>
<div class="flex items-center gap-3">
<span class="hidden sm:inline text-xs text-muted-foreground" th:if="${admin != null}" th:text="${admin.username}">admin</span>
<a th:href="@{/admin/logout}" class="text-xs text-muted-foreground hover:underline">Sign out</a>
</div>
</div>
</header>
</body>
</html>
