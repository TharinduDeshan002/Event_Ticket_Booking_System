<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="sticky top-0 z-50" th:fragment="header(active)">
    <div class="glass-strong border-b border-white/10">
        <div class="container mx-auto flex h-16 items-center justify-between px-4">
            <a class="flex items-center gap-2 group" th:href="@{/}">
                <span class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-primary shadow-glow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-ticket h-4 w-4 text-primary-foreground" aria-hidden="true">
                        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
                        <path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path>
                    </svg>
                </span>
                <span class="font-display text-lg font-semibold tracking-tight">Even<span class="text-gradient">tly</span></span>
            </a>
            <nav class="hidden md:flex items-center gap-1">
                <a th:href="@{/}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
                   th:classappend="${active == 'home'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">Home</a>
                <a th:href="@{/events}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
                   th:classappend="${active == 'events'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">Events</a>
                <a th:href="@{/dashboard}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
                   th:classappend="${active == 'dashboard'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">My Bookings</a>
                <a th:href="@{/admin}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
                   th:classappend="${active == 'admin'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">Admin</a>
            </nav>
            <div class="hidden md:flex items-center gap-2">
                <a th:href="@{/users/login}" class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium cursor-pointer transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring glass text-foreground hover:bg-white/10 transition-smooth h-8 rounded-md px-3 text-xs">Login</a>
                <a th:href="@{/users/register}" class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium cursor-pointer transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring bg-gradient-primary text-primary-foreground shadow-glow hover:opacity-95 hover:-translate-y-0.5 transition-smooth h-8 rounded-md px-3 text-xs">Register</a>
            </div>
            <button type="button" id="mobile-menu-btn" class="md:hidden rounded-lg p-2 hover:bg-white/10" aria-label="Toggle menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu h-5 w-5" aria-hidden="true">
                    <path d="M4 5h16"></path><path d="M4 12h16"></path><path d="M4 19h16"></path>
                </svg>
            </button>
        </div>
        <nav id="mobile-nav" class="hidden md:hidden border-t border-white/10 px-4 py-4 flex flex-col gap-2">
            <a th:href="@{/}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
               th:classappend="${active == 'home'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">Home</a>
            <a th:href="@{/events}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
               th:classappend="${active == 'events'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">Events</a>
            <a th:href="@{/dashboard}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
               th:classappend="${active == 'dashboard'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">My Bookings</a>
            <a th:href="@{/admin}" class="rounded-lg px-3 py-2 text-sm font-medium transition-smooth"
               th:classappend="${active == 'admin'} ? ' text-foreground bg-white/10' : ' text-muted-foreground hover:text-foreground hover:bg-white/5'">Admin</a>
            <a th:href="@{/users/login}" class="rounded-lg px-3 py-2 text-sm font-medium glass">Login</a>
            <a th:href="@{/users/register}" class="rounded-lg px-3 py-2 text-sm font-medium bg-gradient-primary text-primary-foreground text-center">Register</a>
        </nav>
    </div>
</header>
</body>
</html>
