<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<article th:fragment="card(event)"
         class="group relative overflow-hidden rounded-2xl glass shadow-elegant transition-smooth hover:-translate-y-1 hover:shadow-glow">
    <div class="relative aspect-[4/3] overflow-hidden">
        <img th:src="@{'/images/' + ${event.image}}" th:alt="${event.title}" loading="lazy"
             width="1024" height="768"
             class="h-full w-full object-cover transition-smooth group-hover:scale-105"/>
        <div class="absolute inset-0 bg-gradient-to-t from-background/90 via-background/20 to-transparent"></div>
        <span class="absolute top-3 left-3 rounded-full glass px-3 py-1 text-xs font-medium"
              th:text="${event.category}">Category</span>
        <span class="absolute top-3 right-3 rounded-full bg-gradient-primary px-3 py-1 text-xs font-semibold shadow-glow"
              th:text="${event.formattedPrice}">$0</span>
    </div>
    <div class="p-5">
        <h3 class="text-lg font-semibold tracking-tight line-clamp-1" th:text="${event.title}">Event</h3>
        <p class="mt-1 text-xs text-muted-foreground line-clamp-1" th:text="${event.venue}">Venue</p>
        <div class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-sm text-muted-foreground">
            <span class="inline-flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-calendar h-3.5 w-3.5" aria-hidden="true">
                    <path d="M8 2v4"></path><path d="M16 2v4"></path>
                    <rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path>
                </svg>
                <span th:text="${event.formattedDate}">Date</span>
            </span>
            <span class="inline-flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-map-pin h-3.5 w-3.5" aria-hidden="true">
                    <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span th:text="${event.location}">City, Country</span>
            </span>
        </div>
        <div class="mt-4 flex items-center justify-between">
            <span class="text-xs text-muted-foreground"><span th:text="${event.time}">00:00</span> onwards</span>
            <a th:href="@{/bookings/book(eventId=${event.id})}"
               class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium bg-gradient-primary text-primary-foreground shadow-glow hover:opacity-95 hover:-translate-y-0.5 transition-smooth h-8 rounded-md px-3 text-xs">
                Book Now
            </a>
        </div>
    </div>
</article>
</body>
</html>
